services:

  api:
    build: .
    container_name: shipstack-node-api

    ports:
      - "${APP_PORT}:3000"

    env_file:
      - .env

    restart: always

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "http://localhost:3000"
        ]
      interval: 30s
      timeout: 10s
      retries: 3